<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy Birthday!</title>
<style>
    body {
        margin: 0;
        padding: 0;
        font-family: Arial, sans-serif;
        background: linear-gradient(to right, #fceabb, #f8b500);
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        flex-direction: column;
        text-align: center;
        color: #fff;
    }
    h1 {
        font-size: 3em;
        margin-bottom: 0.5em;
        text-shadow: 2px 2px 5px #000;
    }
    p {
        font-size: 1.5em;
        margin-bottom: 1em;
        text-shadow: 1px 1px 3px #000;
    }
    .cake {
        width: 150px;
        height: 150px;
        margin-bottom: 20px;
        background: url('https://i.ibb.co/2gFh2Yb/birthday-cake.png') no-repeat center/contain;
        animation: bounce 1s infinite;
    }
    @keyframes bounce {
        0%, 100% { transform: translateY(0); }
        50% { transform: translateY(-20px); }
    }
</style>
</head>
<body>
<div class="cake"></div>
<h1>Happy Birthday!</h1>
<p>Wishing you lots of joy and happiness 🎉</p>
</body>
</html>
