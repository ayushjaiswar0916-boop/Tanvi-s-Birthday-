
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy Birthday!</title>
<style>
    @import url('https://fonts.googleapis.com/css2?family=Pacifico&display=swap');
    * { margin:0; padding:0; box-sizing:border-box; }
    body, html { height:100%; font-family: 'Pacifico', cursive; overflow:hidden; }
    
    .page {
        position: absolute;
        width: 100%;
        height: 100%;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        text-align: center;
        transition: transform 0.8s ease;
    }

    .hidden { transform: translateX(100%); }

    body { background: #ff9a9e; }

    h1 { font-size: 3em; color: #fff; text-shadow: 2px 2px 8px #000; margin-bottom: 20px; }
    p { font-size: 1.3em; color: #fff; max-width: 90%; text-shadow: 1px 1px 5px #000; }

    .cake {
        font-size: 5em;
        cursor: pointer;
        transition: transform 0.5s;
    }

    .cake:active { transform: scale(0.9) rotate(-15deg); }

    .gift-message {
        font-size: 1.2em;
        background: rgba(0,0,0,0.2);
        padding: 15px 20px;
        border-radius: 15px;
        color:#fff;
        box-shadow: 0 0 15px rgba(0,0,0,0.5);
        line-height: 1.5em;
    }

    .fade-in { animation: fadeIn 1s ease forwards; }
    @keyframes fadeIn { from{opacity:0;} to{opacity:1;} }
</style>
</head>
<body>

<!-- Page 1: Happy Birthday + cake -->
<div id="page1" class="page">
    <h1>🎉 Happy Birthday! 🎉</h1>
    <p>Swipe or tap the cake to cut it!</p>
    <div class="cake">🎂</div>
</div>

<!-- Page 2: Gift + secret message -->
<div id="page2" class="page hidden">
    <h1>🎁 Here's Your Gift! 🎁</h1>
    <div class="gift-message fade-in">
        Hey… I know we haven’t talked, but I wanted to wish you a truly amazing birthday.<br><br>
        May your day be filled with joy, laughter, and magical memories ✨.<br>
        You deserve all the happiness in the world 💖.<br><br>
        Happy Birthday! 🌸
    </div>
</div>

<script>
    const cake = document.querySelector('.cake');
    const page1 = document.getElementById('page1');
    const page2 = document.getElementById('page2');

    function goToGiftPage() {
        page1.classList.add('hidden');
        page2.classList.remove('hidden');
    }

    // Click/tap cake
    cake.addEventListener('click', goToGiftPage);

    // Swipe detection
    let touchstartX = 0;
    let touchendX = 0;

    function checkSwipe() {
        if (touchendX < touchstartX - 50) goToGiftPage();
    }

    document.addEventListener('touchstart', e => { touchstartX = e.changedTouches[0].screenX; });
    document.addEventListener('touchend', e => { touchendX = e.changedTouches[0].screenX; checkSwipe(); });
</script>

</body>
</html>
