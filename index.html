<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy Birthday Tanvi</title>

<style>
body{
  margin:0;
  height:100vh;
  font-family: Arial, sans-serif;
  background: linear-gradient(135deg,#ede2ff,#f7f1ff);
  overflow:hidden;
  color:#5a4b81;
  text-align:center;
}

.page{
  position:absolute;
  inset:0;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
}

.hidden{display:none;}

h1{
  font-size:2.6em;
  margin-bottom:10px;
}

p{
  font-size:1.1em;
  max-width:85%;
  line-height:1.6;
}

button{
  margin-top:25px;
  padding:15px 30px;
  font-size:1.1em;
  border:none;
  border-radius:30px;
  background:white;
  color:#8b6fc4;
  cursor:pointer;
  box-shadow:0 8px 20px rgba(0,0,0,0.15);
}

img{
  width:200px;
  border-radius:50%;
  margin:15px 0;
  box-shadow:0 0 25px rgba(0,0,0,0.25);
}

/* floating stars */
.star{
  position:absolute;
  font-size:22px;
  animation: float 8s linear infinite;
  opacity:0.9;
}

@keyframes float{
  from{transform:translateY(100vh);opacity:1;}
  to{transform:translateY(-10vh);opacity:0;}
}
</style>
</head>

<body>

<!-- MUSIC -->
<audio id="music">
  <source src="blue_yung_mai_music.mp3" type="audio/mpeg">
</audio>

<!-- PAGE 1 -->
<div id="page1" class="page">
  <h1>🎂 Happy Birthday Tanvi 🎂</h1>
  <p>Tap below to cut the cake ✨</p>
  <button onclick="openGift()">Cut the Cake 🎂</button>
</div>

<!-- PAGE 2 -->
<div id="page2" class="page hidden">
  <h1>💜 Just for Tanvi 💜</h1>

  <img src="photo1.jpg" alt="Birthday Photo">
  <img src="sticker.png" alt="Sticker Image">
  <img src="cat.png" alt="Cat Image">

  <p>
    May your birthday be soft like lavender skies,  
    bright like quiet stars,  
    and full of moments that stay with you forever ✨  
    <br><br>
    Happy Birthday Tanvi 🌸
  </p>
</div>

<script>

  document.getElementById("page1").classList.add("hidden");
  document.getElementById("page2").classList.remove("hidden");
