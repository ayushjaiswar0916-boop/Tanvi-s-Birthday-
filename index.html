<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy Birthday</title>

<style>
body{
  margin:0;
  height:100vh;
  font-family: Arial, sans-serif;
  background: linear-gradient(135deg,#ff9a9e,#fad0c4);
  overflow:hidden;
  color:white;
  text-align:center;
}

.page{
  position:absolute;
  inset:0;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
}

.hidden{
  display:none;
}

h1{
  font-size:2.5em;
  margin-bottom:10px;
}

p{
  font-size:1.1em;
  max-width:85%;
  line-height:1.5;
}

button{
  margin-top:25px;
  padding:15px 28px;
  font-size:1.1em;
  border:none;
  border-radius:30px;
  background:white;
  color:#ff5a7a;
  cursor:pointer;
}

img{
  width:200px;
  border-radius:50%;
  box-shadow:0 0 20px rgba(0,0,0,0.4);
  margin:20px 0;
}

/* Floating emojis */
.emoji{
  position:absolute;
  font-size:24px;
  animation: float 6s linear infinite;
}

@keyframes float{
  from{
    transform:translateY(100vh);
    opacity:1;
  }
  to{
    transform:translateY(-10vh);
    opacity:0;
  }
}
</style>
</head>

<body>

<!-- MUSIC -->
<audio id="music">
  <source src="https://raw.githubusercontent.com/ayushjaiswar0916-boop/GehnaBirthday-/main/Blue-Yung-Kai-1%20(1).mp3" type="audio/mpeg">
</audio>

<!-- PAGE 1 -->
<div id="page1" class="page">
  <h1>🎉 Happy Birthday 🎉</h1>
  <p>Tap the button to cut the cake 🎂</p>
  <button onclick="openGift()">Cut the Cake 🎂</button>
</div>

<!-- PAGE 2 -->
<div id="page2" class="page hidden">
  <h1>🎁 Just for You</h1>

  <img src="https://raw.githubusercontent.com/ayushjaiswar0916-boop/GehnaBirthday-/main/photo1.jpg" alt="Birthday Photo">

  <p>
    On your special day, I just wanted to wish you  
    happiness that stays, smiles that come easily,  
    and moments that turn into beautiful memories ✨  
    <br><br>
    Some wishes are simple, but they last forever.  
    Happy Birthday 🌸
  </p>
</div>

<script>
function openGift(){
  document.getElementById("page1").classList.add("hidden");
  document.getElementById("page2").classList.remove("hidden");

  const music = document.getElementById("music");
  music.play().catch(()=>{});

  startEmojis();
}

function startEmojis(){
  const emojis = ["💖","🎉","✨","💫","🎈","🌸","💛"];
  setInterval(()=>{
    const e = document.createElement("div");
    e.className = "emoji";
    e.innerText = emojis[Math.floor(Math.random()*emojis.length)];
    e.style.left = Math.random()*100 + "vw";
    e.style.animationDuration = (4 + Math.random()*4) + "s";
    document.body.appendChild(e);
    setTimeout(()=>e.remove(),8000);
  },300);
}
</script>

</body>
</html>
